<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyxzzz</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("images/mi_fondo.jpg") no-repeat center/cover;
overflow:hidden;
}

/* PARTICULAS */
#particles{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}
.dot{
position:absolute;
width:6px;
height:6px;
background:cyan;
border-radius:50%;
animation:float 6s linear infinite;
opacity:0.7;
}
@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* ENTRADA */
#entrada{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.7);
padding:20px;
}

.caja{
background:rgba(120,120,120,0.6);
padding:25px;
border-radius:20px;
text-align:center;
max-width:400px;
width:100%;
backdrop-filter:blur(10px);
}

.caja h1{
font-size:40px;
}

.caja h3{
color:cyan;
margin-bottom:10px;
}

/* CATALOGOS GRANDES */
.catalogos{
display:flex;
flex-direction:column;
gap:12px;
margin-top:15px;
}

.cat{
background:#111;
padding:18px;
border-radius:15px;
font-size:16px;
transition:0.3s;
}

.cat:active{
transform:scale(0.95);
box-shadow:0 0 20px cyan;
}

/* PANTALLA INFO */
#panel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
z-index:5;
}

#panel h2{
color:cyan;
}

#cerrar{
margin-top:20px;
padding:10px 25px;
border:none;
border-radius:10px;
background:cyan;
color:black;
}
</style>
</head>

<body>

<div id="particles"></div>

<!-- MUSICA -->
<audio id="musica" loop>
<source src="music/eoo.mp3">
</audio>

<!-- ENTRADA -->
<div id="entrada">
<div class="caja">

<h1>Keyxzzz</h1>
<h3>Staff Configurador</h3>

<p>
Tengo 16 años, soy de Ecuador y cuento con más de 1 año de experiencia
creando servidores Minecraft optimizados y profesionales.
</p>

<div class="catalogos">

<div class="cat" onclick="abrir('dev')">💻 Developer | Staff</div>

<div class="cat" onclick="abrir('manager')">🛠️ Manager | Staff</div>

<div class="cat" onclick="abrir('equipo')">👥 Equipo | Staff</div>

<div class="cat" onclick="abrir('builder')">🏗️ Builder | Semi experto</div>

</div>

</div>
</div>

<!-- PANEL INFO -->
<div id="panel">
<div id="contenidoPanel"></div>
<button id="cerrar" onclick="cerrar()">Cerrar</button>
</div>

<script>

/* MUSICA AL PRIMER CLICK */
document.addEventListener("click", ()=>{
let audio=document.getElementById("musica");
audio.volume=0.5;
audio.play().catch(()=>{});
},{once:true});

/* PARTICULAS */
for(let i=0;i<30;i++){
let dot=document.createElement("div");
dot.className="dot";
dot.style.left=Math.random()*100+"%";
dot.style.animationDuration=(3+Math.random()*5)+"s";
document.getElementById("particles").appendChild(dot);
}

/* ABRIR PANEL */
function abrir(tipo){
let panel=document.getElementById("panel");
let cont=document.getElementById("contenidoPanel");

panel.style.display="flex";

if(tipo=="dev"){
cont.innerHTML=`
<h2>💻 Developer</h2>

<p>
Especialista en desarrollo y configuración avanzada de servidores.
Implemento sistemas personalizados y optimización profesional.
</p>

<p>
Trabajo asegurando estabilidad, rendimiento alto y experiencia fluida.
</p>

<ul>
<li>✔ Plugins avanzados</li>
<li>✔ Sistemas únicos</li>
<li>✔ Optimización pro</li>
</ul>`;
}

if(tipo=="manager"){
cont.innerHTML=`
<h2>🛠️ Manager</h2>

<p>
Encargado de la gestión completa del servidor y su funcionamiento.
Organización, control y administración profesional.
</p>

<p>
Aseguro estabilidad del staff y crecimiento del servidor.
</p>

<ul>
<li>✔ Gestión total</li>
<li>✔ Organización</li>
<li>✔ Control de staff</li>
</ul>`;
}

if(tipo=="equipo"){
cont.innerHTML=`
<h2>👥 Equipo</h2>

<p>
Trabajo en equipo manteniendo comunicación y coordinación constante.
Resolución de problemas y apoyo a la comunidad.
</p>

<p>
Experiencia manejando usuarios y conflictos dentro del servidor.
</p>

<ul>
<li>✔ Trabajo en equipo</li>
<li>✔ Soporte activo</li>
<li>✔ Resolución de conflictos</li>
</ul>`;
}

if(tipo=="builder"){
cont.innerHTML=`
<h2>🏗️ Builder</h2>

<p>
Builder semi experto enfocado en estructuras optimizadas y funcionales.
Creación de mapas ligeros y bien diseñados.
</p>

<p>
Equilibrio entre estética y rendimiento.
</p>

<ul>
<li>✔ Mapas optimizados</li>
<li>✔ Diseño funcional</li>
<li>✔ Buen rendimiento</li>
</ul>`;
}

}

/* CERRAR */
function cerrar(){
document.getElementById("panel").style.display="none";
}

</script>

</body>
</html>
