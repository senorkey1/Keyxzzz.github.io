<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyxzzz</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url("images/mi_fondo.jpg") no-repeat center/cover;
overflow:hidden;
}

/* OSCURECER */
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

/* CONTENIDO CENTRAL */
.main{
position:relative;
z-index:2;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* LOGO */
.logo{
width:100px;
margin-bottom:10px;
}

/* TITULO */
h1{
color:#00aaff;
font-size:28px;
margin-bottom:30px;
}

/* GRID OPCIONES */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
width:80%;
max-width:400px;
}

/* BOTONES */
.op{
background:rgba(0,0,0,0.7);
padding:20px;
border-radius:15px;
font-size:14px;
transition:0.3s;
}

.op:active{
transform:scale(0.9);
box-shadow:0 0 20px cyan;
}

/* PANEL INFO */
#panel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
z-index:5;
}

#panel h2{
color:cyan;
}

.btn{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:cyan;
color:black;
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- MUSICA -->
<audio id="musica" loop>
<source src="music/eoo.mp3">
</audio>

<div class="main">

<img src="images/keyxzzz_logo.png" class="logo">

<h1>Keyxzzz » Configurador</h1>

<div class="grid">

<div class="op" onclick="abrir('dev')">
💻 Developer | Staff
</div>

<div class="op" onclick="abrir('manager')">
🛠️ Manager | Staff
</div>

<div class="op" onclick="abrir('equipo')">
👥 Equipo | Staff
</div>

<div class="op" onclick="abrir('builder')">
🏗️ Builder | Semi profesional
</div>

</div>

</div>

<!-- PANEL -->
<div id="panel">
<div id="contenido"></div>
<button class="btn" onclick="cerrar()">Cerrar</button>
</div>

<script>

/* MUSICA */
document.addEventListener("click", ()=>{
let a=document.getElementById("musica");
a.volume=0.5;
a.play().catch(()=>{});
},{once:true});

/* ABRIR INFO */
function abrir(tipo){
let panel=document.getElementById("panel");
let cont=document.getElementById("contenido");

panel.style.display="flex";

if(tipo=="dev"){
cont.innerHTML=`
<h2>💻 Developer | Staff</h2>

<p>
Especialista en desarrollo y configuración avanzada de servidores Minecraft.
Implementación de sistemas únicos y optimización extrema.
</p>

<p>
Experiencia creando servidores estables, rápidos y profesionales.
</p>

<ul>
<li>✔ Plugins personalizados</li>
<li>✔ Sistemas avanzados</li>
<li>✔ Rendimiento alto</li>
</ul>`;
}

if(tipo=="manager"){
cont.innerHTML=`
<h2>🛠️ Manager | Staff</h2>

<p>
Encargado de la gestión completa del servidor.
Organización, control y administración profesional.
</p>

<p>
Experiencia liderando equipos y manteniendo estabilidad del servidor.
</p>

<ul>
<li>✔ Gestión total</li>
<li>✔ Control de staff</li>
<li>✔ Organización</li>
</ul>`;
}

if(tipo=="equipo"){
cont.innerHTML=`
<h2>👥 Equipo | Staff</h2>

<p>
Trabajo en equipo y soporte a la comunidad.
Resolución de problemas y asistencia activa.
</p>

<p>
Buena comunicación y manejo de usuarios.
</p>

<ul>
<li>✔ Soporte activo</li>
<li>✔ Resolución de conflictos</li>
<li>✔ Trabajo en equipo</li>
</ul>`;
}

if(tipo=="builder"){
cont.innerHTML=`
<h2>🏗️ Builder | Semi profesional</h2>

<p>
Builder enfocado en mapas optimizados y funcionales.
Diseño equilibrado entre estética y rendimiento.
</p>

<p>
Experiencia creando estructuras para servidores.
</p>

<ul>
<li>✔ Mapas optimizados</li>
<li>✔ Diseño limpio</li>
<li>✔ Buen rendimiento</li>
</ul>`;
}

}

/* CERRAR */
function cerrar(){
document.getElementById("panel").style.display="none";
}

</script>

</body>
</html>
