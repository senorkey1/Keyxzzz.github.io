<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyxzzz Cartel</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
    <h1 class="intro-text">KEYXZZZ CARTEL</h1>
    <p class="intro-sub">THE WORLD IS YOURS</p>
    <button onclick="enterSite()">ENTRAR</button>
</div>

<!-- 🎵 MÚSICA -->
<audio id="bgMusic" loop>
    <source src="music/eoo.mp3" type="audio/mpeg">
</audio>

<!-- 💀 CONTENIDO -->
<div id="mainContent">

<div class="background-overlay"></div>
<div class="money-rain"></div>

<div class="hud">🔴 LIVE • CARTEL MODE</div>

<div class="container">
    <img src="images/keyxzzz_logo.png" class="profile-avatar">
    <h1>KEYXZZZ</h1>
    <p>Cartel Developer • Box PvP • Discord</p>
</div>

</div>

<button id="musicBtn" class="music-btn">💰</button>

<script>
const music = document.getElementById("bgMusic");
const main = document.getElementById("mainContent");

main.style.display = "none";

function enterSite() {
    document.getElementById("intro").style.display = "none";
    main.style.display = "block";

    music.currentTime = 40;
    music.volume = 0;
    music.play();

    let vol = 0;
    let fade = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            music.volume = vol;
        } else clearInterval(fade);
    }, 200);

    // 💥 efecto cámara
    document.body.classList.add("shake");
    setTimeout(() => {
        document.body.classList.remove("shake");
    }, 500);
}

/* 💰 LLUVIA */
const rain = document.querySelector(".money-rain");
setInterval(() => {
    const money = document.createElement("div");
    money.classList.add("money");
    money.innerText = "💵";
    money.style.left = Math.random() * 100 + "vw";
    money.style.animationDuration = (Math.random() * 3 + 2) + "s";
    rain.appendChild(money);
    setTimeout(() => money.remove(), 5000);
}, 300);
</script>

</body>
</html>
